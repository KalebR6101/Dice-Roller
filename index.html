<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Dice Roller</h1>
        <p>Roll five 6-sided dice for your game</p>
    </header>

    <main>
        <section class="instructions">
            <h2>How to Use</h2>
            <p>Click the "Roll Dice" button or press Enter to roll five dice. Dice values are automatically generated each roll.</p>
        </section>

        <section class="dice-section">
            <table>
                <thead>
                    <tr>
                        <th>Die 1</th>
                        <th>Die 2</th>
                        <th>Die 3</th>
                        <th>Die 4</th>
                        <th>Die 5</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" id="die1" readonly></td>
                        <td><input type="text" id="die2" readonly></td>
                        <td><input type="text" id="die3" readonly></td>
                        <td><input type="text" id="die4" readonly></td>
                        <td><input type="text" id="die5" readonly></td>
                    </tr>
                </tbody>
            </table>

            <button id="rollButton">Roll Dice</button>
        </section>
    </main>

    <footer>
        <p>© 2026 Kaleb Richardson</p>
    </footer>

    <script>
        // Function to roll five dice
        async function rollDice() {
            try {
                for (let i = 1; i <= 5; i++) {
                    const response = await fetch(
                        "https://web-dice-node-awgqftcadtajdyhz.canadacentral-01.azurewebsites.net/roll"
                    );

                    if (!response.ok) throw new Error(`Server error: ${response.status}`);

                    const data = await response.json();
                    document.getElementById(`die${i}`).value = data.dice;
                    console.log(`Die ${i} rolled: ${data.dice}`);
                }
            } catch (err) {
                console.error("Error fetching dice:", err);
                for (let i = 1; i <= 5; i++) document.getElementById(`die${i}`).value = "ERR";
            }
        }

        // Function to wake up backend on page load
        async function wakeUpBackend() {
            try {
                const response = await fetch(
                    "https://web-dice-node-awgqftcadtajdyhz.canadacentral-01.azurewebsites.net/roll"
                );
                if (response.ok) console.log("Backend woken up successfully!");
                else console.warn("Backend wakeup fetch returned status:", response.status);
            } catch (err) {
                console.error("Backend wake-up failed:", err);
            }
        }

        // Wake up backend immediately
        wakeUpBackend();

        // Optional: Press Enter to roll dice
        document.addEventListener("keydown", e => {
            if (e.key === "Enter") rollDice();
        });

        // Keep backend alive by pinging every 4 minutes
        setInterval(() => {
            fetch("https://web-dice-node-awgqftcadtajdyhz.canadacentral-01.azurewebsites.net/roll")
                .then(res => console.log("Backend pinged:", res.status))
                .catch(err => console.error("Backend ping failed:", err));
        }, 4 * 60 * 1000);

        // Attach event to button
        document.getElementById("rollButton").addEventListener("click", rollDice);
    </script>

</body>
</html>
